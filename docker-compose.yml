services:
  postgres:
    image: postgres:16
    container_name: jedzomko_postgres
    environment:
      POSTGRES_USER: jedzomko_user
      POSTGRES_PASSWORD: jedzomko_pass
      POSTGRES_DB: jedzomko_db
    ports:
      - "5432:5432"
    volumes:
      - jedzomko_pgdata:/var/lib/postgresql/data

volumes:
  jedzomko_pgdata: